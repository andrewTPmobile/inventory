<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>ULTRAFIT — 3D Virtualizer</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1734;
    --panel: #171a21;
    --panel-2: #1e222b;
    --line: #2a2f3a;
    --text: #e7e9ee;
    --muted: #9aa3b2;
    --accent: #4f8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 'Barlow Semi Condensed', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 18px 22px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px; background: var(--panel);
    position: sticky; top: 0; z-index: 5;
  }
  header h1 { font-size: 18px; margin: 0; display: flex; align-items: center; gap: 10px; }
  header h1 img { height: 30px; }
  .embed-container {
    max-width: 1100px; margin: 24px auto; padding: 0 22px;
  }
  .embed-container iframe {
    width: 100%; height: calc(100vh - 160px); min-height: 600px;
    border: 1px solid var(--line); border-radius: 14px; background: #fff;
  }

  /* ---- Hamburger menu ---- */
  .menu-btn {
    background: none; border: none; padding: 6px 8px; cursor: pointer;
    display: flex; flex-direction: column; gap: 5px;
  }
  .menu-btn span { display: block; width: 24px; height: 3px; background: var(--text); border-radius: 2px; }
  .menu-btn:hover span { background: var(--accent); }
  #menuOverlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 40; display: none; }
  #sideMenu {
    position: fixed; top: 0; left: -290px; width: 280px; height: 100vh;
    background: var(--panel); border-right: 1px solid var(--line); z-index: 50;
    transition: left .25s ease; display: flex; flex-direction: column; padding: 18px 0;
    overflow-y: auto;
  }
  #sideMenu.open { left: 0; }
  #sideMenu .menu-logo { padding: 4px 20px 16px; border-bottom: 1px solid var(--line); }
  #sideMenu .menu-logo img { height: 26px; }
  #sideMenu .menu-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted);
    padding: 18px 20px 8px; text-transform: uppercase;
  }
  #sideMenu a, #sideMenu button.menu-item {
    display: block; width: 100%; text-align: left; background: none; border: none;
    color: var(--text); font: inherit; font-size: 15px; font-weight: 600;
    padding: 12px 20px; cursor: pointer; text-decoration: none;
  }
  #sideMenu a:hover, #sideMenu button.menu-item:hover { background: var(--panel-2); color: var(--accent); }
  #sideMenu .submenu a { padding-left: 34px; font-weight: 500; font-size: 14px; }
  #sideMenu .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; }
</style>
</head>
<body>

<!-- Slide-in menu -->
<div id="menuOverlay" onclick="closeMenu()"></div>
<nav id="sideMenu">
  <div class="menu-logo">
    <img src="https://ultrafitppf.com/wp-content/uploads/2024/06/USA_White_logo.png" alt="ULTRAFIT" />
  </div>
  <a href="/">🏠 HOME</a>
  <div class="menu-title">Inventory</div>
  <a href="/INVENTORY.html?loc=ULTRAFIT%20NORTH%20USA"><span class="dot" style="background:#79BC29"></span>NORTH INVENTORY</a>
  <a href="/INVENTORY.html?loc=ULTRAFIT%20SOUTH"><span class="dot" style="background:#1B75BB"></span>SOUTH INVENTORY</a>
  <a href="/INVENTORY.html?loc=ULTRAFIT%20WEST"><span class="dot" style="background:#ED741B"></span>WEST INVENTORY</a>
  <button class="menu-item" onclick="alert('Texas inventory is coming soon!')"><span class="dot" style="background:#5BC7F0"></span>TEXAS INVENTORY</button>
  <div class="menu-title">TintPros</div>
  <div class="submenu">
    <a href="/TPTINTCHECKOUT.html">Tint Checkout</a>
    <a href="/TP-PPFCHECKOUT.html">PPF Checkout</a>
  </div>
  <div class="menu-title">Brand</div>
  <div class="submenu">
    <a href="/LOGOGUIDE.html">Logo Guide</a>
    <a href="/3DVIRTUALIZER.html">3D Virtualizer</a>
  </div>
</nav>

<header>
  <button class="menu-btn" onclick="openMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
  <h1><img src="https://ultrafitppf.com/wp-content/uploads/2024/06/USA_White_logo.png" alt="ULTRAFIT" /> 3D Virtualizer</h1>
</header>

<div class="embed-container">
  <iframe
    src="https://app.urable.com/three-d-external-visualizer/R5H0xDMspa0QssZ8QOSj"
    scrolling="no"
    frameborder="0"
    allow="autoplay; fullscreen"
    allowfullscreen></iframe>
</div>

<script>
  function openMenu() {
    document.getElementById("sideMenu").classList.add("open");
    document.getElementById("menuOverlay").style.display = "block";
  }
  function closeMenu() {
    document.getElementById("sideMenu").classList.remove("open");
    document.getElementById("menuOverlay").style.display = "none";
  }
</script>
</body>
</html>
