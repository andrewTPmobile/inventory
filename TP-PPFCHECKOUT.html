<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPF Checkout System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Barlow Semi Condensed', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1734;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 2rem;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 1.5rem;
            color: #1a1a1a;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            font-family: inherit;
            background: white;
            color: #1a1a1a;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
        }
        .items-section {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }
        .items-header {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 1rem;
        }
        .item-row {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            position: relative;
        }
        .item-row.last {
            margin-bottom: 0;
        }
        .item-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .item-grid.full {
            grid-template-columns: 1fr;
        }
        .item-grid label {
            margin-bottom: 4px;
            font-size: 13px;
        }
        .item-grid select,
        .item-grid input {
            font-size: 14px;
            padding: 8px 10px;
        }
        .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }
        .remove-btn:hover {
            background: #cc0000;
        }
        .photo-section {
            background: #f0f8ff;
            border: 2px dashed #0066cc;
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            margin: 1.5rem 0;
        }
        .photo-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        .photo-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .photo-input-wrapper input[type="file"] {
            display: none;
        }
        .photo-btn {
            width: 100%;
            padding: 12px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .photo-btn:hover {
            background: #0052a3;
        }
        .photo-preview {
            margin-top: 12px;
            display: none;
        }
        .photo-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            border: 1px solid #d0d0d0;
        }
        .photo-status {
            margin-top: 12px;
            font-size: 13px;
            color: #2e7d32;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 1.5rem;
        }
        .add-btn {
            flex: 1;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .add-btn:hover {
            background: #218838;
        }
        .add-btn:active {
            transform: scale(0.98);
        }
        .submit-btn {
            flex: 1;
            padding: 12px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background: #0052a3;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .submit-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }
        .success-msg {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: #e8f5e9;
            border-radius: 8px;
            color: #2e7d32;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        .error-msg {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: #ffebee;
            border-radius: 8px;
            color: #c62828;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; align-items: center; justify-content: center; gap: 2rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid #e0e0e0;">
            <img src="https://www.tintprosmobile.com/wp-content/uploads/2026/03/cropped-Tint-Pros-Platinum-Auto-Wraps-2021-Logo-Black-e1622686350565-300x72-1.webp" alt="Tint Pros Logo" style="max-height: 60px; width: auto;">
            <img src="https://www.ultrafitprotection.com/images/content/logo_horizontal.png" alt="Ultrafit Logo" style="max-height: 60px; width: auto; padding: 10px; border-radius: 8px;">
        </div>
        <h1>PPF Checkout</h1>
        <form id="checkoutForm">
            <div class="form-group">
                <label for="employeeName">Employee name</label>
                <input type="text" id="employeeName" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="checkoutDate">Date</label>
                <input type="date" id="checkoutDate" required>
            </div>
            <!-- Items Section -->
            <div class="items-section">
                <div class="items-header">Rolls checked out</div>
                <div id="itemsList"></div>
            </div>
            <div class="button-group">
                <button type="button" class="add-btn" id="addItemBtn">+ Add roll</button>
            </div>
            <!-- Photo Section -->
            <div class="photo-section">
                <label class="photo-label">Take a picture with all the rolls you taken</label>
                <div class="photo-input-wrapper">
                    <input type="file" id="photoInput" accept="image/*" capture="environment">
                    <button type="button" class="photo-btn" id="photoBtn">📷 Take photo</button>
                </div>
                <div class="photo-preview" id="photoPreview">
                    <img id="photoImg" alt="Photo preview">
                </div>
                <div class="photo-status" id="photoStatus"></div>
            </div>
            <div class="button-group" style="margin-top: 1.5rem;">
                <button type="submit" class="submit-btn">Submit checkout</button>
            </div>
        </form>
        <div class="success-msg" id="successMsg">
            ✓ Checkout submitted successfully
        </div>
        <div class="error-msg" id="errorMsg">
            Could not submit. Please check the form and try again.
        </div>
    </div>
    <script>
        // Full active PPF collection (sizes match Shopify variants).
        // Order: XP CRYSTAL / RETRO MATTE / BLACK / BLACK MATTE first, then the rest.
        const products = {
            'XP CRYSTAL': ['72" x 40 ft', '60" x 50 ft', '48" x 50 ft', '36" x 100 ft', '30" x 100 ft', '24" x 100 ft'],
            'XP RETRO MATTE': ['72" x 40ft', '60" x 50ft'],
            'XP BLACK': ['60" x 50ft'],
            'XP BLACK MATTE': ['60" x 50ft'],
            'XP BLACK CARBON': ['60" x 20ft'],
            'XP BLACK FORGED': ['60" x 20ft'],
            'XP AURORA SILVER': ['60" x 60ft'],
            'XP AURORA MAGENTA': ['60" x 60ft'],
            'XP AURORA AQUA': ['60" x 60ft'],
            'XP AURORA FOREST': ['60" x 60ft'],
            'XP AURORA PURPLE': ['60" x 60ft'],
            'XP PHOENIX RED': ['60" x 60ft'],
            'XP DEEP CHROMA BLUE': ['60" x 60ft'],
            'XP PEARL WHITE': ['60" x 60ft'],
            'XP STONE BEIGE': ['60" x 60ft'],
            'XP LIGHT STONE': ['60" x 60ft'],
            'XP MOUNTAIN GRAY': ['60" x 60ft'],
            'XP TUSCAN YELLOW': ['60" x 60ft'],
            'XP METALLIC SILVER': ['60" x 60ft'],
            'XP METALLIC ROSE SILVER': ['60" x 60ft'],
            'XP VINTAGE BLUE': ['60" x 60ft'],
            'XP RETRO PHOENIX RED': ['60" x 60ft'],
            'XP RETRO PEARL WHITE': ['60" x 60ft'],
            'XP RETRO STONE BEIGE': ['60" x 60ft'],
            'XP RETRO METALLIC SILVER': ['60" x 60ft'],
            'XP RETRO TUSCAN YELLOW': ['60" x 60ft'],
            'XP RETRO VINTAGE BLUE': ['60" x 60ft'],
            'XP MOONLIGHT': ['30" x 50ft'],
            'XP GRAPHITE': ['30" x 50ft'],
            'XP GOLD BLACK': ['30" x 50ft']
        };
        const productOrder = Object.keys(products);
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuLDz0BUJLCtfVW-kr6krwLonk6gZ3MvTaem__dSMsGRREyJZJLsgQusI6MTHItUy5/exec";
        let itemCount = 0;
        let photoBase64 = null;
        // Set today's date by default
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('checkoutDate').value = today;
        // Photo handling
        document.getElementById('photoBtn').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('photoInput').click();
        });
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    photoBase64 = event.target.result;
                    document.getElementById('photoImg').src = photoBase64;
                    document.getElementById('photoPreview').style.display = 'block';
                    document.getElementById('photoStatus').textContent = '✓ Photo captured';
                    document.getElementById('photoStatus').style.color = '#2e7d32';
                };
                reader.readAsDataURL(file);
            }
        });
        // Add first item on load
        function addItem() {
            const itemsList = document.getElementById('itemsList');
            const itemId = itemCount++;
            const isLast = itemsList.children.length === 0;
            const itemRow = document.createElement('div');
            itemRow.className = `item-row ${isLast ? 'last' : ''}`;
            itemRow.id = `item-${itemId}`;
            itemRow.innerHTML = `
                <button type="button" class="remove-btn" onclick="removeItem(${itemId})" style="${isLast ? 'display:none;' : ''}">Remove</button>
                <div class="item-grid full">
                    <div>
                        <label>Film type</label>
                        <select class="product-select" data-item-id="${itemId}" required>
                            <option value="">Select type...</option>
                            ${productOrder.map(p => `<option value="${p}">${p}</option>`).join('')}
                        </select>
                    </div>
                </div>
                <div class="item-grid">
                    <div>
                        <label>Size</label>
                        <select class="size-select" data-item-id="${itemId}" required>
                            <option value="">Select size...</option>
                        </select>
                    </div>
                    <div>
                        <label>Quantity</label>
                        <input type="number" class="quantity-input" data-item-id="${itemId}" min="1" value="1" required>
                    </div>
                </div>
            `;
            itemsList.appendChild(itemRow);
            // When the film type changes, load its sizes
            const productSelect = itemRow.querySelector('.product-select');
            productSelect.addEventListener('change', function() {
                updateSizeOptions(itemId, this.value);
            });
            updateRemoveButtons();
        }
        function updateSizeOptions(itemId, productType) {
            const sizeSelect = document.querySelector(`.size-select[data-item-id="${itemId}"]`);
            const sizeValues = products[productType] || [];
            sizeSelect.innerHTML = '<option value="">Select size...</option>';
            sizeValues.forEach(size => {
                const option = document.createElement('option');
                option.value = size;
                option.textContent = size;
                sizeSelect.appendChild(option);
            });
        }
        function removeItem(itemId) {
            const item = document.getElementById(`item-${itemId}`);
            if (item) {
                item.remove();
                updateRemoveButtons();
            }
        }
        function updateRemoveButtons() {
            const items = document.querySelectorAll('.item-row');
            items.forEach((item, index) => {
                const removeBtn = item.querySelector('.remove-btn');
                removeBtn.style.display = index === 0 && items.length === 1 ? 'none' : 'block';
            });
        }
        document.getElementById('addItemBtn').addEventListener('click', function(e) {
            e.preventDefault();
            addItem();
        });
        document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const employeeName = document.getElementById('employeeName').value;
            const checkoutDate = document.getElementById('checkoutDate').value;
            const items = [];
            document.querySelectorAll('.item-row').forEach(row => {
                const product = row.querySelector('.product-select').value;
                const size = row.querySelector('.size-select').value;
                const quantity = row.querySelector('.quantity-input').value;
                if (product && size && quantity) {
                    items.push({
                        product,
                        vlt: "",              // PPF has no VLT
                        size,
                        quantity: parseInt(quantity)
                    });
                }
            });
            if (items.length === 0) {
                alert('Please add at least one roll');
                return;
            }
            if (!photoBase64) {
                alert('Please take a photo before submitting');
                return;
            }
            const data = {
                checkoutType: "PPF",
                employeeName,
                checkoutDate,
                items,
                photoBase64: photoBase64,
                timestamp: new Date().toLocaleString()
            };
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    document.getElementById('checkoutForm').style.display = 'none';
                    document.getElementById('successMsg').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('checkoutForm').style.display = 'block';
                        document.getElementById('successMsg').style.display = 'none';
                        document.getElementById('checkoutForm').reset();
                        document.getElementById('checkoutDate').value = today;
                        document.getElementById('itemsList').innerHTML = '';
                        itemCount = 0;
                        addItem();
                        photoBase64 = null;
                        document.getElementById('photoPreview').style.display = 'none';
                        document.getElementById('photoStatus').textContent = '';
                        document.getElementById('employeeName').focus();
                    }, 2000);
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('errorMsg').style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
            }
        });
        // Initialize with first item
        addItem();
    </script>
</body>
</html>
