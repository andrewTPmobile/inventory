<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>ULTRAFIT — Inventory Dashboard</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
      --bg: #0F1734;
      --panel: #171a21;
      --panel-2: #1e222b;
      --line: #2a2f3a;
      --text: #e7e9ee;
      --muted: #9aa3b2;
      --accent: #4f8cff;
      --ok: #79BC29;
      --warn: #ED741B;
      --bad: #e5484d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.4 'Barlow Semi Condensed', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .3px; display: flex; align-items: center; gap: 10px; }
  header h1 .logo { height: 30px; width: auto; display: block; }
  header .sub { color: var(--muted); font-size: 16px; }
  .spacer { flex: 1; }
  button, input, select {
    font: inherit;
    color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 12px;
    outline: none;
  }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .stats {
    display: flex; gap: 12px; flex-wrap: wrap;
    padding: 16px 22px 0;
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; min-width: 150px;
  }
  .card .n { font-size: 24px; font-weight: 700; }
  .card .l { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .card.bad .n { color: var(--bad); }
  .card.warn .n { color: var(--warn); }
  .toolbar { display: flex; gap: 12px; flex-wrap: wrap; padding: 16px 22px; align-items: flex-end; }
  .toolbar .field { display: flex; flex-direction: column; gap: 4px; }
  .toolbar .field label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding-left: 2px;
  }
  .toolbar .field input[type="search"] { width: 100%; }
  .toolbar #rowcount { align-self: flex-end; padding-bottom: 9px; }
  .wrap { padding: 0 22px 40px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
  th {
    position: sticky; top: 63px; background: var(--panel);
    font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  th.sorted::after { content: " \25BE"; color: var(--accent); }
  th.sorted.asc::after { content: " \25B4"; }
  tbody tr:hover { background: var(--panel-2); }
  td.qty { font-weight: 700; text-align: center; font-variant-numeric: tabular-nums; font-size: 24px; }
  th:last-child { text-align: center; }
  td.price { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
  #toolbar.west-mode .field { display: none; }
  #toolbar.west-mode #searchField { display: flex; }
  #toolbar.west-mode .field:has(#locationFilter) { display: flex; }
  /* West mode: product name already includes the size, so show Product + Qty only
     (columns are: 1 image, 2 product, 3 variant, 4 qty) */
  #tableHost.west-mode th:nth-child(1), #tableHost.west-mode td:nth-child(1),
  #tableHost.west-mode th:nth-child(3), #tableHost.west-mode td:nth-child(3) {
    display: none;
  }
  #tableHost.west-mode td.qty { font-size: 24px; padding: 14px 12px; }
  .pill { padding: 5px 14px; border-radius: 999px; font-size: 22px; font-weight: 700; }
  .pill.ok { background: rgba(47,191,113,.15); color: var(--ok); }
  .pill.warn { background: rgba(224,168,61,.15); color: var(--warn); }
  .pill.bad { background: rgba(229,72,77,.15); color: var(--bad); }
  .pill.mid { background: rgba(224,168,61,.15); color: #e0a83d; }
  .pill.na { background: rgba(154,163,178,.12); color: var(--muted); }
  .pill.status { font-size: 15px; white-space: nowrap; }
  /* Korea (HQ) mode: sheet-driven status view — search + location only */
  #toolbar.korea-mode .field { display: none; }
  #toolbar.korea-mode #searchField { display: flex; }
  #toolbar.korea-mode .field:has(#locationFilter) { display: flex; }
  #tableHost.korea-mode td.qty { font-size: 15px; padding: 12px; }
  #tableHost.korea-mode th { cursor: default; }
  /* All-locations mode: one column per location */
  #tableHost.matrix-mode { overflow-x: auto; }
  #tableHost.matrix-mode table { min-width: 900px; }
  /* the scroll container becomes the sticky viewport, so the header's 63px
     offset would sit on top of row 1 — pin it to the container instead */
  #tableHost.matrix-mode th { top: 0; }
  #tableHost.matrix-mode th.loc, #tableHost.matrix-mode td.loc { text-align: center; white-space: nowrap; }
  #tableHost.matrix-mode th.loc { color: var(--text); }
  #tableHost.matrix-mode td.loc .pill { font-size: 24px; padding: 6px 16px; }
  #tableHost.matrix-mode th.total, #tableHost.matrix-mode td.total { text-align: center; }
  #tableHost.matrix-mode td.total {
    font-weight: 700; font-size: 28px; font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  /* Korea HQ reports a status, not a count — give it room and set it apart */
  #tableHost.matrix-mode th.korea-col, #tableHost.matrix-mode td.korea-col {
    border-right: 1px solid var(--line); padding-right: 16px;
  }
  #tableHost.matrix-mode td.korea-col .pill { font-size: 16px; }
  .thumb { width: 34px; height: 34px; object-fit: cover; border-radius: 6px; background: var(--panel-2); }
  .muted { color: var(--muted); }
  .status-chip { font-size: 11px; color: var(--muted); text-transform: uppercase; }
  #err { color: var(--bad); font-size: 13px; min-height: 18px; }
  .loading { padding: 40px 22px; color: var(--muted); }
  @media (max-width: 640px) {
    header { position: static; padding: 12px 16px; gap: 8px 10px; }
    header h1 { font-size: 16px; }
    header h1 .logo { height: 22px; }
    header .sub { font-size: 13px; order: 5; flex-basis: 100%; }
    .stats { padding: 12px 16px 0; gap: 8px; }
    .stats .card { min-width: 0; flex: 1 1 calc(33.333% - 6px); padding: 10px 10px; }
    .stats .card .n { font-size: 18px; }
    .stats .card .l { font-size: 10px; }
    .toolbar { padding: 12px 16px; gap: 10px; }
    .toolbar .field { flex: 1 1 100% !important; max-width: none !important; min-width: 0 !important; }
    .toolbar select, .toolbar input { width: 100%; padding: 11px 12px; }
    .toolbar #rowcount { flex-basis: 100%; padding: 2px 0 0; }
    .wrap { padding: 0 12px 30px; }
    #tableHost { overflow-x: auto; }
    th { position: static; }
    th, td { padding: 10px 8px; }
    /* hide only the image column on phones (columns: image, product, variant, qty) */
    th:nth-child(1), td:nth-child(1) {
      display: none;
    }
    /* the matrix view has no image column — keep Product visible */
    #tableHost.matrix-mode th:nth-child(1), #tableHost.matrix-mode td:nth-child(1) {
      display: table-cell;
    }
    td.qty { font-size: 20px; }
  }

  /* ---- Hamburger menu ---- */
  .menu-btn {
    background: none; border: none; padding: 6px 8px; cursor: pointer;
    display: flex; flex-direction: column; gap: 5px;
  }
  .menu-btn span { display: block; width: 24px; height: 3px; background: var(--text); border-radius: 2px; }
  .menu-btn:hover span { background: var(--accent); }
  #menuOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 40; display: none;
  }
  #sideMenu {
    position: fixed; top: 0; left: -290px; width: 280px; height: 100vh;
    background: var(--panel); border-right: 1px solid var(--line); z-index: 50;
    transition: left .25s ease; display: flex; flex-direction: column; padding: 18px 0;
    overflow-y: auto;
  }
  #sideMenu.open { left: 0; }
  #sideMenu .menu-logo { padding: 4px 20px 16px; border-bottom: 1px solid var(--line); }
  #sideMenu .menu-logo img { height: 26px; }
  #sideMenu .menu-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted);
    padding: 18px 20px 8px; text-transform: uppercase;
  }
  #sideMenu a, #sideMenu button.menu-item {
    display: block; width: 100%; text-align: left; background: none; border: none;
    color: var(--text); font: inherit; font-size: 15px; font-weight: 600;
    padding: 12px 20px; cursor: pointer; text-decoration: none;
  }
  #sideMenu a:hover, #sideMenu button.menu-item:hover { background: var(--panel-2); color: var(--accent); }
  #sideMenu .submenu a { padding-left: 34px; font-weight: 500; font-size: 14px; }
  #sideMenu .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:10px; }
</style>
</head>

<style id="uf-gate-style">
  html.uf-locked body > *:not(#uf-gate) { display: none !important; }
  #uf-gate {
    position: fixed; inset: 0; z-index: 99999;
    display: flex; align-items: center; justify-content: center;
    background: #0F1734;
    font-family: 'Barlow Semi Condensed', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #uf-gate .uf-card {
    background: #171a21; border: 1px solid #2a2f3a; border-radius: 16px;
    padding: 40px 36px; width: min(92vw, 380px); text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.45);
  }
  #uf-gate img.uf-logo { height: 48px; max-width: 80%; margin-bottom: 18px; }
  #uf-gate h2 { color: #e7e9ee; margin: 0 0 6px; font-size: 22px; letter-spacing: 1px; text-transform: uppercase; }
  #uf-gate p { color: #9aa3b2; margin: 0 0 22px; font-size: 15px; }
  #uf-gate input {
    width: 100%; font: inherit; font-size: 17px; letter-spacing: 2px; text-align: center;
    color: #e7e9ee; background: #1e222b; border: 1px solid #2a2f3a; border-radius: 10px;
    padding: 12px 14px; outline: none; text-transform: uppercase;
  }
  #uf-gate input:focus { border-color: #4f8cff; }
  #uf-gate button {
    width: 100%; margin-top: 14px; font: inherit; font-size: 16px; font-weight: 600;
    color: #fff; background: #165da3; border: none; border-radius: 10px;
    padding: 12px 14px; cursor: pointer; letter-spacing: .5px;
  }
  #uf-gate button:hover { background: #4f8cff; }
  #uf-gate .uf-err { color: #e5484d; font-size: 14px; margin-top: 12px; min-height: 18px; }
</style>
<div id="uf-gate" hidden>
  <div class="uf-card">
    <img class="uf-logo" src="/apple-touch-icon.png" alt="ULTRAFIT" onerror="this.style.display='none'">
    <h2>Restricted Access</h2>
    <p>Enter the access passcode to continue</p>
    <input id="uf-pass" type="password" placeholder="PASSCODE" autocomplete="off" />
    <button id="uf-go">Enter</button>
    <div class="uf-err" id="uf-err"></div>
  </div>
</div>
<script>
(function () {
  var HASH = '0cdb731e6c996f361337e9d225f7f8cac20fc60b6ceb7f0285c72013f4067ee8';
  var KEY = 'uf_portal_unlocked';
  var root = document.documentElement;
  function unlock() {
    try { sessionStorage.setItem(KEY, '1'); } catch (e) {}
    root.classList.remove('uf-locked');
    var g = document.getElementById('uf-gate');
    if (g) g.remove();
    var s = document.getElementById('uf-gate-style');
    if (s) s.remove();
  }
  var already = false;
  try { already = sessionStorage.getItem(KEY) === '1'; } catch (e) {}
  if (already) { unlock(); return; }
  root.classList.add('uf-locked');
  var gate = document.getElementById('uf-gate');
  gate.hidden = false;
  var input = document.getElementById('uf-pass');
  var err = document.getElementById('uf-err');
  function sha256hex(str) {
    var data = new TextEncoder().encode(str);
    return crypto.subtle.digest('SHA-256', data).then(function (buf) {
      return Array.prototype.map.call(new Uint8Array(buf), function (b) {
        return ('0' + b.toString(16)).slice(-2);
      }).join('');
    });
  }
  function attempt() {
    var v = (input.value || '').trim();
    if (!v) return;
    if (!(window.crypto && crypto.subtle)) {
      err.textContent = 'This browser is not supported.';
      return;
    }
    sha256hex(v).then(function (hex) {
      if (hex === HASH) { unlock(); }
      else {
        err.textContent = 'Incorrect passcode. Please try again.';
        input.value = ''; input.focus();
      }
    });
  }
  document.getElementById('uf-go').addEventListener('click', attempt);
  input.addEventListener('keydown', function (e) { if (e.key === 'Enter') attempt(); });
  setTimeout(function () { input.focus(); }, 50);
})();
</script>

<header>
  <button class="menu-btn" onclick="openMenu()" aria-label="Menu"><span></span><span></span><span></span></button>
  <h1><img src="https://ultrafitppf.com/wp-content/uploads/2024/06/USA_White_logo.png" alt="ULTRAFIT" class="logo" /> Inventory</h1>
  <span class="sub" id="updated">—</span>
  <div class="spacer"></div>
  <button class="primary" onclick="loadData()">↻ Refresh</button>
</header>
<div class="stats" id="stats"></div>
<div class="toolbar" id="toolbar">
  <div class="field" id="searchField" style="flex:1;max-width:380px;min-width:240px;">
    <label for="search">Search</label>
    <input type="search" id="search" placeholder="Product, SKU, vendor, type…" oninput="render()" />
  </div>
  <div class="field">
    <label for="locationFilter">Location</label>
    <select id="locationFilter" onchange="render()">
      <option value="all">All locations</option>
    </select>
  </div>
  <div class="field">
    <label for="typeFilter">Product Type</label>
    <select id="typeFilter" onchange="populateVariantFilter(); render()">
      <option value="all">All types</option>
    </select>
  </div>
  <div class="field">
    <label for="vltFilter">VLT</label>
    <select id="vltFilter" onchange="render()">
      <option value="all">All VLT</option>
    </select>
  </div>
  <div class="field">
    <label for="sizeFilter">Size</label>
    <select id="sizeFilter" onchange="render()">
      <option value="all">All sizes</option>
    </select>
  </div>
  <span class="muted" id="rowcount"></span>
</div>
<div class="wrap">
  <div id="tableHost"><div class="loading">Loading inventory…</div></div>
</div>

<script>
  // ---- Hamburger menu ----
  function openMenu() {
    document.getElementById("sideMenu").classList.add("open");
    document.getElementById("menuOverlay").style.display = "block";
  }
  function closeMenu() {
    document.getElementById("sideMenu").classList.remove("open");
    document.getElementById("menuOverlay").style.display = "none";
  }
  // Jump to a location with filters reset to show EVERYTHING there
  function goLocation(loc) {
    const locSel = document.getElementById("locationFilter");
    if ([...locSel.options].some(o => o.value === loc)) locSel.value = loc;
    document.getElementById("typeFilter").value = "all";
    document.getElementById("vltFilter").value = "all";
    document.getElementById("sizeFilter").value = "all";
    document.getElementById("search").value = "";
    // every location opens in the default CLEAR PPF / XP CRYSTAL order
    sortKey = "featured";
    sortAsc = false;
    closeMenu();
    render();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  const LOW_THRESHOLD = 5;
  // Home view lands on the all-locations board (Korea HQ + every US warehouse)
  const DEFAULT_LOCATION = "all";
  const DEFAULT_TYPE = "CLEAR PPF";
  let firstLoad = true;
  let DATA = [];
  let KOREA_UPDATED = null;
  let WEST_UPDATED = null;
  // Locations that carry real counts — the columns of the All-locations view.
  // KOREA STOCK is status-only (no numbers), so it isn't a column.
  let QTY_LOCATIONS = [];
  let sortKey = "featured";
  let sortAsc = false;

  // Preferred left-to-right order for the location columns; anything not
  // listed here follows, alphabetically.
  const LOCATION_ORDER = [
    "ULTRAFIT NORTH USA",
    "ULTRAFIT SOUTH",
    "ULTRAFIT WEST",
    "UF West",
  ];

  function fmtMoney(n) {
    if (n === null || n === undefined) return "";
    return "$" + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function stockPill(q) {
    if (q < 0) return '<span class="pill bad">' + q + '</span>';
    if (q === 0) return '<span class="pill warn">0</span>';
    if (q <= LOW_THRESHOLD) return '<span class="pill warn">' + q + '</span>';
    return '<span class="pill ok">' + q + '</span>';
  }

  function effQty(r) {
    const loc = document.getElementById("locationFilter").value;
    if (loc === "all") return r.qty;
    const q = locQty(r, loc);
    return q === null ? 0 : q;
  }

  // Quantity at one location, or null when the item isn't stocked there at all
  // (which reads differently from "stocked here, currently 0").
  function locQty(r, loc) {
    return (r.byLoc && typeof r.byLoc[loc] === "number") ? r.byLoc[loc] : null;
  }

  async function loadData() {
    document.getElementById("err").textContent = "";
    document.getElementById("tableHost").innerHTML = '<div class="loading">Loading inventory…</div>';
    try {
      const r = await fetch("/api/inventory");
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        throw new Error(j.error || ("HTTP " + r.status));
      }
      const j = await r.json();
      DATA = j.rows || [];
      KOREA_UPDATED = j.koreaUpdated || null;
      // the sheet's own stamp reads better than a raw Drive timestamp
      WEST_UPDATED = j.westUpdated ||
        (j.westModified ? new Date(j.westModified).toLocaleDateString() : null);
      const locs = j.locations || [];
      QTY_LOCATIONS = locs
        .filter(l => l !== "KOREA STOCK")
        .sort((a, b) => {
          const ia = LOCATION_ORDER.indexOf(a), ib = LOCATION_ORDER.indexOf(b);
          if (ia > -1 && ib > -1) return ia - ib;
          if (ia > -1) return -1;
          if (ib > -1) return 1;
          return a.localeCompare(b);
        });
      populateFilters(locs);
      const d = new Date(j.updatedAt);
      document.getElementById("updated").textContent =
        "Updated " + d.toLocaleString() + " · " + j.count + " items";
      render();
    } catch (e) {
      document.getElementById("tableHost").innerHTML = "";
      document.getElementById("err").textContent = "Error: " + e.message;
    }
  }

  // Only these product types appear in the filter, in this order.
  // (Matched case-insensitively; a type shows once products in Shopify use it.)
  const ALLOWED_TYPES = [
    "BLACK PPF",
    "CLEAR PPF",
    "COLOR SHIFT PPF",
    "HEADLIGHT PPF",
    "MAX BLUE 70",
    "MAX BLUE",
    "RETRO COLOR PPF",
    "SPF",
    "Vivid Series",
    "WINDSHIELD PROTECTION",
    "WINDSHIELD PROTECTION FILM",
    "WPF"
  ];

  // ---- Default ("featured") row order ----
  // Every location opens with CLEAR PPF at the top, and XP CRYSTAL at the top
  // of CLEAR PPF. Clicking a column header switches to that plain sort.
  const TYPE_PRIORITY = ["CLEAR PPF"].concat(
    ALLOWED_TYPES.filter(t => t.toUpperCase() !== "CLEAR PPF")
  );
  const PRODUCT_PRIORITY = ["XP CRYSTAL"];   // leads its type group

  function typeRank(t) {
    const u = normType(t);
    const i = TYPE_PRIORITY.findIndex(x => normType(x) === u);
    return i === -1 ? TYPE_PRIORITY.length : i;
  }
  function productRank(p) {
    const u = normType(p);
    const i = PRODUCT_PRIORITY.findIndex(x => u.indexOf(normType(x)) === 0);
    return i === -1 ? PRODUCT_PRIORITY.length : i;
  }
  // type → product → sizes of that product together, biggest stock first
  function featuredCmp(qtyOf) {
    return (a, b) => {
      const t = typeRank(a.type) - typeRank(b.type);
      if (t) return t;
      const p = productRank(a.product) - productRank(b.product);
      if (p) return p;
      const n = normType(a.product).localeCompare(normType(b.product));
      if (n) return n;
      // Korea-only rows sit under the product they belong to, not above it
      const ka = a.koreaOnly ? 1 : 0, kb = b.koreaOnly ? 1 : 0;
      if (ka !== kb) return ka - kb;
      return (qtyOf(b) || 0) - (qtyOf(a) || 0);
    };
  }

  function populateFilters(locations) {
    const locSel = document.getElementById("locationFilter");
    // Allow deep links like /?loc=ULTRAFIT%20SOUTH from the checkout pages' menus
    const urlLoc = new URLSearchParams(window.location.search).get("loc");
    const prevLoc = firstLoad ? (urlLoc || DEFAULT_LOCATION) : locSel.value;
    locSel.innerHTML = '<option value="all">All locations</option>' +
      locations.map(l => `<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join("");
    if ([...locSel.options].some(o => o.value === prevLoc)) locSel.value = prevLoc;

    // Types present in the data, shown only if whitelisted, in whitelist order
    const present = Array.from(new Set(DATA.map(r => r.type).filter(Boolean)));
    const types = TYPE_PRIORITY
      .map(a => present.find(p => p.toUpperCase() === a.toUpperCase()))
      .filter(Boolean)
      .filter((v, i, arr) => arr.indexOf(v) === i);
    const typeSel = document.getElementById("typeFilter");
    const prevType = firstLoad ? (urlLoc ? "all" : DEFAULT_TYPE) : typeSel.value;
    typeSel.innerHTML = '<option value="all">All types</option>' +
      types.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");
    if ([...typeSel.options].some(o => o.value === prevType)) typeSel.value = prevType;

    populateVariantFilter();
    firstLoad = false;
  }

  // Split a variant title into { vlt, size }.
  // Tint variants look like "15 / 60\" x 100ft" (VLT / size);
  // everything else's variant IS the size (e.g. "60\" x 60ft").
  function splitVariant(v) {
    const s = String(v || "");
    const i = s.indexOf("/");
    if (i > -1 && /^\s*\d+\s*$/.test(s.slice(0, i))) {
      return { vlt: s.slice(0, i).trim(), size: normSize(s.slice(i + 1)) };
    }
    return { vlt: null, size: normSize(s) };
  }
  function normSize(s) {
    return String(s || "")
      .replace(/×/g, "x")
      .replace(/\s*[xX]\s*/g, " x ")
      .replace(/(\d)\s*ft\b/gi, "$1ft")
      .replace(/\s+/g, " ")
      .trim();
  }

  // VLT + Size dropdowns follow the selected type
  function populateVariantFilter() {
    const typeSel = document.getElementById("typeFilter");
    const vltSel = document.getElementById("vltFilter");
    const sizeSel = document.getElementById("sizeFilter");
    const prevVlt = vltSel.value || "all";
    const prevSize = sizeSel.value || "all";

    let rows = DATA;
    if (typeSel.value !== "all") rows = rows.filter(r => r.type === typeSel.value);

    const vlts = new Set(), sizes = new Set();
    rows.forEach(r => {
      const p = splitVariant(r.variant);
      if (p.vlt) vlts.add(p.vlt);
      if (p.size) sizes.add(p.size);
    });

    const vltList = Array.from(vlts).sort((a, b) => Number(a) - Number(b));
    const sizeList = Array.from(sizes).sort();

    vltSel.innerHTML = '<option value="all">All VLT</option>' +
      vltList.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
    if ([...vltSel.options].some(o => o.value === prevVlt)) vltSel.value = prevVlt;

    sizeSel.innerHTML = '<option value="all">All sizes</option>' +
      sizeList.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
    if ([...sizeSel.options].some(o => o.value === prevSize)) sizeSel.value = prevSize;
  }

  // Sort value for a column key. "loc:<name>" sorts by that location's column
  // in the All-locations view; everything else is a plain row field.
  function sortVal(r, key) {
    if (key === "qty") return effQty(r);
    if (key.indexOf("loc:") === 0) {
      const q = locQty(r, key.slice(4));
      return q === null ? -Infinity : q;
    }
    return r[key];
  }

  function currentRows() {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const typeFilter = document.getElementById("typeFilter").value;
    const vltFilter = document.getElementById("vltFilter").value;
    const sizeFilter = document.getElementById("sizeFilter").value;
    const locFilter = document.getElementById("locationFilter").value;
    let rows = DATA.slice();

    // KOREA STOCK: sheet-driven status rows only, keep the sheet's order
    if (locFilter === "KOREA STOCK") {
      rows = rows.filter(r => r.source === "korea");
      if (q) {
        rows = rows.filter(r =>
          (r.product + " " + r.type + " " + r.variant + " " + (r.koreaStatus || "") + " " + (r.notes || ""))
            .toLowerCase().includes(q)
        );
      }
      return rows;
    }
    // Korea rows never mix into other views
    rows = rows.filter(r => r.source !== "korea");

    // When filtering by ULTRAFIT WEST, show only Google Sheets items
    if (locFilter === "ULTRAFIT WEST") {
      rows = rows.filter(r => r.source === "google");
      // For ULTRAFIT WEST, skip other filters and only apply search
    } else {
      // For other Shopify locations, show only Shopify items
      if (locFilter !== "all") {
        rows = rows.filter(r => r.source === "shopify");
      }
      // All stock levels and all statuses are always shown
      if (typeFilter !== "all") rows = rows.filter(r => r.type === typeFilter);
      if (vltFilter !== "all") rows = rows.filter(r => splitVariant(r.variant).vlt === vltFilter);
      if (sizeFilter !== "all") rows = rows.filter(r => splitVariant(r.variant).size === sizeFilter);
    }

    if (q) {
      rows = rows.filter(r =>
        (r.product + " " + r.sku + " " + r.vendor + " " + r.type + " " + r.variant)
          .toLowerCase().includes(q)
      );
    }
    if (sortKey === "featured") {
      rows.sort(featuredCmp(effQty));
      return rows;
    }
    rows.sort((a, b) => {
      let x = sortVal(a, sortKey);
      let y = sortVal(b, sortKey);
      if (typeof x === "string") { x = x.toLowerCase(); y = (y || "").toLowerCase(); }
      if (x === null || x === undefined) x = -Infinity;
      if (y === null || y === undefined) y = -Infinity;
      if (x < y) return sortAsc ? -1 : 1;
      if (x > y) return sortAsc ? 1 : -1;
      return 0;
    });
    return rows;
  }

  // Color a Korea sheet status like "Healthy 50+" / "Out of Stock"
  function koreaPill(status) {
    const s = (status || "").toLowerCase();
    const label = escapeHtml(status || "No report");
    if (!s) return '<span class="pill na status">No report</span>';
    if (s.includes("out")) return '<span class="pill bad status">' + label + '</span>';
    if (s.includes("low")) return '<span class="pill warn status">' + label + '</span>';
    if (s.includes("medium")) return '<span class="pill mid status">' + label + '</span>';
    if (s.includes("healthy")) return '<span class="pill ok status">' + label + '</span>';
    return '<span class="pill na status">' + label + '</span>';
  }

  function renderKorea() {
    const rows = currentRows();
    const kAll = DATA.filter(r => r.source === "korea");
    const healthy = kAll.filter(r => (r.koreaStatus || "").toLowerCase().includes("healthy")).length;
    const medium = kAll.filter(r => (r.koreaStatus || "").toLowerCase().includes("medium")).length;
    const low = kAll.filter(r => (r.koreaStatus || "").toLowerCase().includes("low")).length;
    const out = kAll.filter(r => (r.koreaStatus || "").toLowerCase().includes("out")).length;
    document.getElementById("stats").innerHTML = `
      <div class="card"><div class="n">${kAll.length}</div><div class="l">Items reported</div></div>
      <div class="card"><div class="n" style="color:var(--ok)">${healthy}</div><div class="l">Healthy</div></div>
      <div class="card"><div class="n" style="color:#e0a83d">${medium}</div><div class="l">Medium</div></div>
      <div class="card warn"><div class="n">${low}</div><div class="l">Low</div></div>
      <div class="card bad"><div class="n">${out}</div><div class="l">Out of stock</div></div>
      <div class="card"><div class="n">${escapeHtml(KOREA_UPDATED || "—")}</div><div class="l">Korea sheet updated</div></div>
    `;
    document.getElementById("rowcount").textContent = rows.length + " shown";
    let html = "<table><thead><tr><th>Type</th><th>Product</th><th>Size</th><th>Korea Stock</th><th>Back / Notes</th></tr></thead><tbody>";
    for (const r of rows) {
      const extra = [r.dateBack, r.notes].filter(Boolean).join(" · ");
      html += "<tr>";
      html += `<td class="muted">${escapeHtml(r.type)}</td>`;
      html += `<td>${escapeHtml(r.product)}</td>`;
      html += `<td class="muted">${escapeHtml(r.variant)}</td>`;
      html += `<td class="qty">${koreaPill(r.koreaStatus)}</td>`;
      html += `<td class="muted">${escapeHtml(extra)}</td>`;
      html += "</tr>";
    }
    html += "</tbody></table>";
    document.getElementById("tableHost").innerHTML = html;
  }

  // ---- All-locations view --------------------------------------------------
  // The same physical product arrives from three sources under three different
  // spellings — Shopify ("XP CRYSTAL" + variant "60\" x 50 ft"), the WEST sheet
  // ("XP CRYSTAL (60\" x 50ft)") and the Korea sheet ("XP Crystal" + "60\" x 50
  // ft (250sqf)"). itemKey() reduces all three to one identity so a product
  // gets ONE row with every location on it.
  const KOREA_COL = "KOREA HQ";

  function normName(s) { return String(s || "").toUpperCase().replace(/[^A-Z0-9]/g, ""); }

  // "60\" x 50 ft (250sqf)" → "60x50ft"; "" when the text has no W x L
  function sizeKey(s) {
    const m = String(s || "").match(/(\d+)\s*(?:"|”|inch(?:es)?|in)?\s*[x×]\s*(\d+)\s*(ft|feet|m|mm|cm)?/i);
    return m ? m[1] + "x" + m[2] + (m[3] || "ft").toLowerCase().replace("feet", "ft") : "";
  }

  // Tint variants lead with the VLT: "05 / 60\" x 100ft" → "5"
  function vltKey(s) {
    const m = String(s || "").match(/^\s*(\d{1,2})\s*\//);
    return m ? String(Number(m[1])) : "";
  }

  function itemKey(product, variant) {
    let p = String(product || ""), v = String(variant || "");
    // The sheets pack the size into the product name — pull it back out
    const m = p.match(/\(([^()]*\d[^()]*)\)\s*$/);
    if (m) { if (!v) v = m[1]; p = p.slice(0, m.index); }
    return normName(p) + "|" + vltKey(v) + "|" + sizeKey(v);
  }

  // The Korea sheet's Max Blue rows keep the product name in the Type cell
  // ("Window Tint\nMax Blue 70") and leave only a size in the Product column.
  function koreaKey(r) {
    const p = String(r.product || "").trim();
    const sizeOnly = p && /^[\d\s"'”×xX.\/ftinsqf()-]+$/.test(p);
    if (sizeOnly && r.type) {
      const lines = String(r.type).split("\n").map(s => s.trim()).filter(Boolean);
      const name = lines[lines.length - 1];
      if (name) return itemKey(name, r.variant || p);
    }
    return itemKey(r.product, r.variant);
  }

  // Order for sorting the Korea column, worst stock first
  function koreaRank(status) {
    const s = (status || "").toLowerCase();
    if (!s) return -1;
    if (s.includes("out")) return 0;
    if (s.includes("very low")) return 1;
    if (s.includes("low")) return 2;
    if (s.includes("medium")) return 3;
    if (s.includes("super")) return 5;
    if (s.includes("healthy")) return 4;
    return -1;
  }

  // One display row: merged quantities + the Korea sheet's status
  function matrixRow(base, group) {
    const byLoc = {};
    for (const r of group) {
      for (const l of QTY_LOCATIONS) {
        const q = locQty(r, l);
        if (q !== null) byLoc[l] = (byLoc[l] || 0) + q;
      }
    }
    // Total is the sum of the columns actually shown, so it always reconciles
    // (r.qty would also count the retired "Korea WH" Shopify location)
    let total = 0;
    for (const l of QTY_LOCATIONS) if (typeof byLoc[l] === "number") total += byLoc[l];
    return {
      product: base.product, variant: base.variant, status: base.status,
      type: base.type, vendor: base.vendor, sku: base.sku,
      key: itemKey(base.product, base.variant),
      byLoc: byLoc, total: total, korea: null,
    };
  }

  function mergeRows(rows) {
    const groups = new Map();
    for (const r of rows) {
      const k = itemKey(r.product, r.variant);
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(r);
    }
    const out = [];
    for (const group of groups.values()) {
      // Two rows from the SAME source that share a key are genuinely different
      // products (uniform sizes, display boards) — never fold those together.
      const sources = group.map(r => r.source);
      const oneEach = sources.length === new Set(sources).size;
      if (group.length > 1 && oneEach) {
        out.push(matrixRow(group.find(r => r.source === "shopify") || group[0], group));
      } else {
        group.forEach(r => out.push(matrixRow(r, [r])));
      }
    }
    return out;
  }

  // Hang each Korea sheet row on its product; return the ones with no counterpart
  function attachKorea(rows) {
    const koreaRows = DATA.filter(r => r.source === "korea");
    const koreaByKey = new Map(), rowsByKey = new Map();
    for (const r of koreaRows) {
      const k = koreaKey(r);
      koreaByKey.set(k, (koreaByKey.get(k) || []).concat([r]));
    }
    for (const row of rows) rowsByKey.set(row.key, (rowsByKey.get(row.key) || 0) + 1);

    const used = new Set();
    for (const row of rows) {
      const hit = koreaByKey.get(row.key);
      // Only pair when it is unambiguous on both sides
      if (hit && hit.length === 1 && rowsByKey.get(row.key) === 1) {
        row.korea = hit[0];
        used.add(hit[0]);
      }
    }
    return koreaRows.filter(r => !used.has(r));
  }

  // Korea items with no Shopify/WEST counterpart still get a row of their own
  function koreaOnlyRows(leftovers) {
    return leftovers.map(r => ({
      product: r.product, variant: r.variant, status: "ACTIVE", key: "",
      type: r.type, vendor: "", sku: "",
      byLoc: {}, total: null, korea: r, koreaOnly: true,
    }));
  }

  // Filters run AFTER the merge: the WEST sheet leaves Type blank and spells it
  // differently, so filtering the raw rows first would strip WEST quantities off
  // products that should keep them.
  function normType(s) { return String(s || "").toUpperCase().replace(/\s+/g, " ").trim(); }

  function matrixFilter(rows) {
    const q = document.getElementById("search").value.trim().toLowerCase();
    const typeFilter = normType(document.getElementById("typeFilter").value);
    const vltFilter = document.getElementById("vltFilter").value;
    const sizeFilter = document.getElementById("sizeFilter").value;
    return rows.filter(r => {
      if (typeFilter !== "ALL") {
        const t = normType(r.type);
        // Korea-only rows carry the sheet's own wording ("Window Tint Max Blue 70")
        const hit = r.koreaOnly ? t.indexOf(typeFilter) > -1 : t === typeFilter;
        if (!hit) return false;
      }
      const p = splitVariant(r.variant);
      if (vltFilter !== "all" && p.vlt !== vltFilter) return false;
      if (sizeFilter !== "all" && p.size !== sizeFilter) return false;
      if (q) {
        const hay = [r.product, r.variant, r.type, r.vendor, r.sku,
                     r.korea && r.korea.koreaStatus, r.korea && r.korea.notes]
                     .filter(Boolean).join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  function matrixSortVal(row, key) {
    if (key === "qty") return row.total === null ? -Infinity : row.total;
    if (key === "korea") return koreaRank(row.korea && row.korea.koreaStatus);
    if (key.indexOf("loc:") === 0) {
      const q = row.byLoc[key.slice(4)];
      return typeof q === "number" ? q : -Infinity;
    }
    return row[key];
  }

  function renderMatrix() {
    const locs = QTY_LOCATIONS;
    const merged = mergeRows(DATA.filter(r => r.source !== "korea"));
    const leftovers = attachKorea(merged);
    const rows = matrixFilter(merged.concat(koreaOnlyRows(leftovers)));

    if (sortKey === "featured") {
      rows.sort(featuredCmp(r => r.total));
    } else {
      rows.sort((a, b) => {
        let x = matrixSortVal(a, sortKey), y = matrixSortVal(b, sortKey);
        if (typeof x === "string") { x = x.toLowerCase(); y = (y || "").toLowerCase(); }
        if (x === null || x === undefined) x = -Infinity;
        if (y === null || y === undefined) y = -Infinity;
        if (x < y) return sortAsc ? -1 : 1;
        if (x > y) return sortAsc ? 1 : -1;
        return 0;
      });
    }

    // Per-location unit totals across everything currently filtered in
    const totals = {};
    locs.forEach(l => { totals[l] = 0; });
    let grand = 0;
    for (const r of rows) {
      for (const l of locs) {
        const q = r.byLoc[l];
        if (typeof q === "number" && q > 0) { totals[l] += q; grand += q; }
      }
    }
    const koreaOut = rows.filter(r => r.korea && (r.korea.koreaStatus || "").toLowerCase().includes("out")).length;
    document.getElementById("stats").innerHTML =
      `<div class="card"><div class="n">${rows.length}</div><div class="l">Products shown</div></div>` +
      `<div class="card bad"><div class="n">${koreaOut}</div><div class="l">Out at Korea HQ</div></div>` +
      locs.map(l =>
        `<div class="card"><div class="n">${totals[l].toLocaleString()}</div><div class="l">${escapeHtml(l)}</div></div>`
      ).join("") +
      `<div class="card"><div class="n">${grand.toLocaleString()}</div><div class="l">Units (US total)</div></div>`;
    document.getElementById("rowcount").textContent =
      rows.length + " shown" +
      (KOREA_UPDATED ? " · Korea sheet " + KOREA_UPDATED : "") +
      (WEST_UPDATED ? " · WEST sheet " + WEST_UPDATED : "");

    const th = (label, key, cls) => {
      const sorted = key === sortKey ? "sorted " + (sortAsc ? "asc" : "") : "";
      return `<th class="${cls || ""} ${sorted}" onclick="setSort('${key}')">${escapeHtml(label)}</th>`;
    };
    let html = "<table><thead><tr>";
    html += th("Product", "product");
    html += th("Variant", "variant");
    html += th(KOREA_COL, "korea", "loc korea-col");
    for (const l of locs) html += th(l, "loc:" + l, "loc");
    html += th("US Total", "qty", "total");
    html += "</tr></thead><tbody>";

    for (const r of rows) {
      const kNote = r.korea ? [r.korea.dateBack, r.korea.notes].filter(Boolean).join(" · ") : "";
      html += "<tr>";
      html += `<td>${escapeHtml(r.product)}${r.status !== "ACTIVE" ? ` <span class="status-chip">· ${r.status.toLowerCase()}</span>` : ""}` +
              `${r.koreaOnly ? ' <span class="status-chip">· korea only</span>' : ""}</td>`;
      html += `<td class="muted">${escapeHtml(r.variant)}</td>`;
      html += `<td class="loc korea-col"${kNote ? ` title="${escapeHtml(kNote)}"` : ""}>` +
              `${r.korea ? koreaPill(r.korea.koreaStatus) : '<span class="muted">—</span>'}</td>`;
      for (const l of locs) {
        const q = r.byLoc[l];
        html += `<td class="loc">${typeof q === "number" ? stockPill(q) : '<span class="muted">—</span>'}</td>`;
      }
      html += `<td class="total">${r.total === null ? '<span class="muted">—</span>' : r.total.toLocaleString()}</td>`;
      html += "</tr>";
    }
    html += "</tbody></table>";
    document.getElementById("tableHost").innerHTML = html;
  }

  function render() {
    if (!DATA.length) return;
    const locFilter = document.getElementById("locationFilter").value;
    const isWestMode = locFilter === "ULTRAFIT WEST";
    const isKoreaMode = locFilter === "KOREA STOCK";
    const isMatrixMode = locFilter === "all";

    // Apply mode styling
    document.getElementById("toolbar").classList.toggle("west-mode", isWestMode);
    document.getElementById("toolbar").classList.toggle("korea-mode", isKoreaMode);
    const tableHostEl = document.getElementById("tableHost");
    tableHostEl.classList.toggle("korea-mode", isKoreaMode);
    tableHostEl.classList.toggle("matrix-mode", isMatrixMode);
    if (isKoreaMode) {
      tableHostEl.classList.remove("west-mode");
      renderKorea();
      return;
    }
    if (isMatrixMode) {
      tableHostEl.classList.remove("west-mode");
      renderMatrix();
      return;
    }

    const rows = currentRows();
    const typeFilter = document.getElementById("typeFilter").value;
    let statRows = DATA.slice(); // all statuses
    if (typeFilter !== "all") statRows = statRows.filter(r => r.type === typeFilter);
    const neg = statRows.filter(r => effQty(r) < 0).length;
    const zero = statRows.filter(r => effQty(r) === 0).length;
    const low = statRows.filter(r => effQty(r) >= 1 && effQty(r) <= LOW_THRESHOLD).length;
    const totalUnits = statRows.reduce((s, r) => s + (effQty(r) > 0 ? effQty(r) : 0), 0);
    const locLabel = document.getElementById("locationFilter").value;
    const unitsLabel = locLabel === "all" ? "Units (all loc.)" : "Units here";
    document.getElementById("stats").innerHTML = `
      <div class="card"><div class="n">${statRows.length}</div><div class="l">SKUs</div></div>
      <div class="card bad"><div class="n">${neg}</div><div class="l">Negative stock</div></div>
      <div class="card warn"><div class="n">${zero}</div><div class="l">Out of stock</div></div>
      <div class="card warn"><div class="n">${low}</div><div class="l">Low (1–${LOW_THRESHOLD})</div></div>
      <div class="card"><div class="n">${totalUnits.toLocaleString()}</div><div class="l">${unitsLabel}</div></div>
      ${isWestMode && WEST_UPDATED
        ? `<div class="card"><div class="n">${escapeHtml(WEST_UPDATED)}</div><div class="l">WEST sheet updated</div></div>`
        : ""}
    `;
    document.getElementById("rowcount").textContent = rows.length + " shown" +
      (isWestMode && WEST_UPDATED ? " · WEST sheet " + WEST_UPDATED : "");
    const cols = [
      ["", "image"],
      ["Product", "product"],
      ["Variant", "variant"],
      ["Qty", "qty"],
    ];
    let html = "<table><thead><tr>";
    for (const [label, key] of cols) {
      const sortable = key !== "image";
      const cls = (key === sortKey ? "sorted " + (sortAsc ? "asc" : "") : "");
      html += `<th class="${cls}" ${sortable ? `onclick="setSort('${key}')"` : ""}>${label}</th>`;
    }
    html += "</tr></thead><tbody>";
    for (const r of rows) {
      html += "<tr>";
      html += `<td>${r.image ? `<img class="thumb" src="${r.image}" loading="lazy" />` : `<div class="thumb"></div>`}</td>`;
      html += `<td>${escapeHtml(r.product)} ${r.status !== "ACTIVE" ? `<span class="status-chip">· ${r.status.toLowerCase()}</span>` : ""}</td>`;
      html += `<td class="muted">${escapeHtml(r.variant)}</td>`;
      html += `<td class="qty">${stockPill(effQty(r))}</td>`;
      html += "</tr>";
    }
    html += "</tbody></table>";
    const tableHost = document.getElementById("tableHost");
    tableHost.innerHTML = html;
    tableHost.classList.toggle("west-mode", isWestMode);
  }

  function setSort(key) {
    if (sortKey === key) sortAsc = !sortAsc;
    else { sortKey = key; sortAsc = key === "qty" ? true : true; }
    render();
  }

  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  loadData();
</script>
